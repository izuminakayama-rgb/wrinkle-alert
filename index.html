<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>リンクル 朝一アラート（Chrome専用）</title>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont;
      padding: 20px;
      max-width: 720px;
      margin: auto;
      background: #fafafa;
      color: #222;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 6px;
    }

    p {
      font-size: 13px;
      color: #555;
      margin-top: 0;
    }

    textarea {
      width: 100%;
      height: 170px;
      margin-top: 10px;
      padding: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      margin-top: 10px;
      padding: 8px 18px;
      font-size: 14px;
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    h2 {
      margin-top: 28px;
      font-size: 18px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 4px;
    }

    /* ✅ 今日の予定：シンプル黒字（時計マークなし） */
    ul {
      margin-top: 10px;
      padding-left: 18px;
    }

    li {
      font-size: 14px;
      color: #000;
      margin-bottom: 6px;
    }
  </style>
</head>

<body>

<h1>リンクル 朝一アラート（Chrome専用）</h1>
<p>
  朝一でリンクルをスクショ → OCR結果を貼り付け → 放置でOK<br>
  予定の<strong>1分前</strong>に通知・やさしい音・全画面アラートが出ます
</p>

<textarea id="ocrText" placeholder="例：
15:40 - 16:50 テスト
17:00 - 18:00 会議">
</textarea>

<br>
<button onclick="importSchedule()">朝一インポート</button>

<h2>今日の予定</h2>
<ul id="scheduleList"></ul>

<!-- 🔊 女の子向け・やさしい通知音（Google公式） -->
<audio id="alarmSound" preload="auto">
  https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg
</audio>

<script>
  if ("Notification" in window && Notification.permission !== "granted") {
    Notification.requestPermission();
  }

  function importSchedule() {
    const textarea = document.getElementById("ocrText");
    const list = document.getElementById("scheduleList");
    const sound = document.getElementById("alarmSound");

    list.innerHTML = "";

    const lines = textarea.value.split("\n");
    const regex = /(\d{1,2}:\d{2})\s*-\s*(\d{1,2}:\d{2})/;
    const today = new Date();

    lines.forEach(line => {
      const match = line.match(regex);
      if (!match) return;

      const [h, m] = match[1].split(":").map(Number);
      const startTime = new Date(today);
      startTime.setHours(h, m, 0, 0);

      const li = document.createElement("li");
      li.textContent = line.trim();
      list.appendChild(li);

      const notifyAt = new Date(startTime.getTime() - 60 * 1000);
      const delay = notifyAt.getTime() - Date.now();

      if (delay > 0 && Notification.permission === "granted") {
        setTimeout(() => {

          // 🔔 ブラウザ通知（最大限強調）
          new Notification("🌷 まもなく開始 🌷", {
            body:
              "━━━━━━━━━━━━━━\n" +
              line.trim() + "\n" +
              "━━━━━━━━━━━━━━\n" +
              "※ 1分後に開始します"
          });

          // 🔊 やさしい通知音を5秒
          if (sound) {
            sound.currentTime = 0;
            sound.play().catch(() => {});
            setTimeout(() => sound.pause(), 5000);
          }

          // 🖥 全画面ポップアップ
          openFullscreenPopup(line.trim());

        }, delay);
      }
    });
  }

  function openFullscreenPopup(text) {
    const popup = window.open(
      "",
      "_blank",
      "popup=yes,width=600,height=400"
    );
    if (!popup) return;

    popup.document.write(`
      <html>
      <head>
        <title>まもなく予定</title>
        <style>
          body {
            margin: 0;
            background: #111;
            color: #fff;
            font-family: system-ui;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
          }
          .box {
            text-align: center;
          }
          h1 {
            font-size: 36px;
            color: #ffb6c1;
            margin-bottom: 20px;
          }
          p {
            font-size: 26px;
          }
        </style>
      </head>
      <body>
        <div class="box">
          <h1>まもなく開始</h1>
          <p>${text}</p>
        </div>
        <script>
          document.documentElement.requestFullscreen?.();
        <\/script>
      </body>
      </html>
    `);
  }
</script>

</body>
</html>
``
