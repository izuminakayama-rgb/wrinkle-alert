<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>リンクル 朝一アラート（Chrome専用）</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont;
      padding: 16px;
      max-width: 720px;
      margin: auto;
    }
    textarea {
      width: 100%;
      height: 160px;
      margin-top: 8px;
    }
    button {
      margin-top: 8px;
    }
    ul {
      margin-top: 12px;
    }
  </style>
</head>
<body>

<h1>リンクル 朝一アラート（Chrome専用）</h1>
<p>
  朝一でリンクルをスクショ → OCR結果貼り付け → 放置でOK<br>
  予定の <b>1分前</b> にPC通知が出ます
</p>

<input type="file" disabled />
<p style="font-size: 12px;">※ 現在OCRは手動貼り付け</p>

<textarea
  id="ocrText"
  placeholder="例：
15:50 - 16:10 テスト
17:00 - 18:00 会議">
</textarea>

<br>
<button onclick="importSchedule()">朝一インポート</button>

<h2>今日の予定</h2>
<ul id="scheduleList"></ul>

<script>
  if ("Notification" in window && Notification.permission !== "granted") {
    Notification.requestPermission();
  }

  function importSchedule() {
    const textarea = document.getElementById("ocrText");
    const list = document.getElementById("scheduleList");
    list.innerHTML = "";

    if (!textarea) {
      alert("テキスト欄が見つかりません");
      return;
    }

    const lines = textarea.value.split("\n");
    const regex = /(\d{1,2}:\d{2})\s*-\s*(\d{1,2}:\d{2})/;
    const today = new Date();

    lines.forEach(line => {
      const match = line.match(regex);
      if (!match) return;

      const [h, m] = match[1].split(":").map(Number);
      const startTime = new Date(today);
      startTime.setHours(h, m, 0, 0);

      // ✅ 表示は常に行う
      const li = document.createElement("li");
      li.textContent = `⏰ ${line.trim()}`;
      list.appendChild(li);

      // ✅ 通知は未来のみ
      const notifyAt = new Date(startTime.getTime() - 60 * 1000);
      const delay = notifyAt.getTime() - Date.now();

      if (delay > 0 && Notification.permission === "granted") {
        setTimeout(() => {
          new Notification("まもなく予定", {
            body: line.trim()
          });
        }, delay);
      }
    });
  }
</script>

</body>
</html>
