<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>リンクル 朝一アラート（Chrome専用）</title>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont;
      padding: 16px;
      max-width: 720px;
      margin: auto;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 4px;
    }

    textarea {
      width: 100%;
      height: 160px;
      margin-top: 8px;
      font-size: 14px;
    }

    button {
      margin-top: 10px;
      padding: 6px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    h2 {
      margin-top: 24px;
      font-size: 18px;
    }

    /* ✅ 今日の予定：シンプル表示（元に戻す） */
    ul {
      margin-top: 8px;
      padding-left: 18px;
    }

    li {
      font-size: 14px;
      margin-bottom: 4px;
    }
  </style>
</head>

<body>

<h1>リンクル 朝一アラート（Chrome専用）</h1>
<p style="font-size:13px;">
  朝一でリンクルをスクショ → OCR結果を貼り付け → 放置でOK<br>
  予定の<strong>1分前</strong>に通知・音・全画面アラートが出ます
</p>

<textarea id="ocrText" placeholder="例：
15:40 - 16:50 テスト
17:00 - 18:00 会議"></textarea>

<br>
<button onclick="importSchedule()">朝一インポート</button>

<h2>今日の予定</h2>
<ul id="scheduleList"></ul>

<!-- 🔊 アラーム音（Google公式） -->
<audio id="alarmSound" preload="auto">
  <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
</audio>

<script>
  // 通知許可
  if ("Notification" in window && Notification.permission !== "granted") {
    Notification.requestPermission();
  }

  function importSchedule() {
    const textarea = document.getElementById("ocrText");
    const list = document.getElementById("scheduleList");
    const sound = document.getElementById("alarmSound");

    list.innerHTML = "";

    const lines = textarea.value.split("\n");
    const regex = /(\d{1,2}:\d{2})\s*-\s*(\d{1,2}:\d{2})/;
    const today = new Date();

    lines.forEach(line => {
      const match = line.match(regex);
      if (!match) return;

      const [h, m] = match[1].split(":").map(Number);
      const startTime = new Date(today);
      startTime.setHours(h, m, 0, 0);

      // ✅ 今日の予定に必ず表示（シンプル）
      const li = document.createElement("li");
      li.textContent = line.trim();
      list.appendChild(li);

      // ✅ 通知は未来のみ
      const notifyAt = new Date(startTime.getTime() - 60 * 1000);
      const delay = notifyAt.getTime() - Date.now();

      if (delay > 0 && Notification.permission === "granted") {
        setTimeout(() => {
          // 🔔 ブラウザ通知（最大限強調）
          new Notification("🚨🚨 まもなく開始 🚨🚨", {
            body:
              "━━━━━━━━━━━━━━\n" +
              "⏰ " + line.trim() + "\n" +
              "━━━━━━━━━━━━━━\n" +
              "※ 1分後に開始"
          });

          // 🔊 連続音（約5秒）
          if (sound) {
            sound.currentTime = 0;
            sound.play().catch(() => {});
            setTimeout(() => sound.pause(), 5000);
          }

          // 🖥 全画面ポップアップ
          openFullscreenPopup(line.trim());

        }, delay);
      }
    });
  }

  // ✅ 全画面ポップアップ
  function openFullscreenPopup(text) {
    const popup = window.open(
      "",
      "_blank",
      "popup=yes,width=600,height=400"
    );

    if (!popup) return;

    popup.document.write(`
      <html>
      <head>
        <title>まもなく予定</title>
        <style>
          body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #000;
            color: #fff;
            font-family: system-ui;
          }
          .box {
            text-align: center;
          }
          h1 {
            color: #ff5252;
            font-size: 42px;
            margin-bottom: 20px;
          }
          p {
            font-size: 28px;
          }
        </style>
      </head>
      <body>
        <div class="box">
          <h1>🚨 まもなく開始 🚨</h1>
          <p>${text}</p>
        </div>
        <script>
          document.documentElement.requestFullscreen?.();
        <\/script>
      </body>
      </html>
    `);
  }
</script>

</body>
</html>
