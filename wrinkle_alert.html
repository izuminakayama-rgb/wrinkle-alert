<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>リンクル朝一アラート</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont;
      padding: 16px;
      max-width: 720px;
      margin: auto;
    }
    h1 {
      font-size: 20px;
    }
    textarea {
      width: 100%;
      height: 180px;
      margin-top: 8px;
    }
    button {
      margin-top: 8px;
      padding: 6px 12px;
    }
    ul {
      margin-top: 16px;
    }
  </style>
</head>
<body>

<h1>リンクル 朝一アラート（Chrome専用）</h1>

<p>
  朝一でリンクルをスクショ → OCR結果貼り付け → 放置でOK<br>
  予定の <b>1分前</b> にPC通知が出ます
</p>

<input type="file" id="imageInput" accept="image/*" />

<textarea id="ocrText" placeholder="OCR結果が入る想定（今は手動貼り付け）"></textarea>

<br>
<button onclick="importSchedule()">朝一インポート</button>

<h2>今日の予定</h2>
<ul id="scheduleList"></ul>

<script>
  // Chrome通知の許可
  if ("Notification" in window && Notification.permission !== "granted") {
    Notification.requestPermission();
  }

  function importSchedule() {
    const text = document.getElementById("ocrText").value;
    const lines = text.split("\\n");
    const regex = /(\\d{2}:\\d{2})\\s*-\\s*(\\d{2}:\\d{2})/;
    const today = new Date();
    const list = document.getElementById("scheduleList");
    list.innerHTML = "";

    lines.forEach(line => {
      const match = line.match(regex);
      if (!match) return;

      const start = match[1];
      const [h, m] = start.split(":").map(Number);
      const startTime = new Date(today);
      startTime.setHours(h, m, 0, 0);

      const notifyAt = new Date(startTime.getTime() - 60 * 1000);
      const delay = notifyAt.getTime() - Date.now();

      const li = document.createElement("li");
      li.textContent = `⏰ ${line.trim()}`;
      list.appendChild(li);

      if (delay > 0 && Notification.permission === "granted") {
        setTimeout(() => {
          new Notification("まもなく予定", {
            body: line.trim()
          });
        }, delay);
      }
    });
  }
</script>

</body>
</html>
